<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEasy - Manage Products</title>
  <link rel="icon" type="img/shopping.png" href="img/shopping.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* UI DESIGN INSPIRED BY AI SUPPORT CONCIERGE */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
    
    body { 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        min-height: 100vh; 
        color: #333;
        padding-bottom: 50px;
    }

    header {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        padding: 15px 5%;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    header h1 { color: white; font-size: 1.5rem; letter-spacing: 1px; }

    .nav-container { display: flex; align-items: center; gap: 20px; }
    .nav-left a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; transition: 0.3s; padding: 5px 10px; border-radius: 8px; }
    .nav-left a:hover, .nav-left a.active { background: rgba(255,255,255,0.2); color: white; }
    
    #logout-btn { 
        background: #ff4757; color: white; border: none; padding: 8px 18px; 
        border-radius: 20px; cursor: pointer; font-weight: 500; transition: 0.3s;
    }
    #logout-btn:hover { background: #ff6b81; transform: scale(1.05); }

    main { padding: 40px 5%; }
    .title-section { text-align: center; color: white; margin-bottom: 40px; }
    .title-section h2 { font-size: 2rem; margin-bottom: 10px; }

    /* PRODUCT GRID */
    .product-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
        gap: 30px; 
    }

    .product { 
        background: rgba(255, 255, 255, 0.95); 
        border-radius: 25px; 
        padding: 20px; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
        text-align: center; 
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 1px solid rgba(255,255,255,0.3);
    }
    .product:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .product img { width: 100%; height: 230px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; }
    .product h3 { font-size: 1.3rem; margin-bottom: 10px; color: #2d3436; }
    
    .price-pill { 
        background: #f1f2f6; padding: 5px 12px; border-radius: 12px; 
        font-size: 0.8rem; display: inline-block; margin: 2px; color: #764ba2; font-weight: 600;
    }

    .info-text { font-size: 0.85rem; color: #636e72; margin-top: 10px; }
    .info-text strong { color: #2d3436; }

    /* BUTTONS */
    .actions { display: flex; gap: 12px; margin-top: 25px; }
    .edit-btn { background: #764ba2; color: white; flex: 2; border: none; padding: 12px; border-radius: 15px; cursor: pointer; font-weight: 600; transition: 0.3s; }
    .edit-btn:hover { background: #5a3a85; box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4); }
    .delete-btn { background: #f1f2f6; color: #eb4d4b; flex: 1; border: none; padding: 12px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
    .delete-btn:hover { background: #ffeaa7; color: #d63031; }

    /* MODALS */
    .popup-overlay { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
        display: none; align-items: center; justify-content: center; z-index: 1000; 
    }
    .popup-overlay.show { display: flex; }
    
    .popup, .edit-modal { 
        background: white; border-radius: 30px; padding: 35px; 
        width: 90%; max-width: 480px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        animation: popUp 0.3s ease-out;
    }
    @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .edit-modal input, .edit-modal textarea { 
        width: 100%; padding: 14px; margin-bottom: 15px; 
        border: 2px solid #f1f2f6; border-radius: 12px; outline: none; transition: 0.3s;
    }
    .edit-modal input:focus { border-color: #764ba2; }

    /* SUCCESS TOAST */
    .success-popup { 
        position: fixed; top: 30px; right: 30px; background: #2ecc71; 
        color: white; padding: 18px 30px; border-radius: 20px; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.2); transform: translateX(200%); 
        transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 2000;
    }
    .success-popup.show { transform: translateX(0); }

    .no-products { text-align: center; color: white; font-size: 1.2rem; opacity: 0.8; margin-top: 100px; }
  </style>
</head>
<body>

  <header>
    <h1>ShopEasy</h1>
    <nav class="nav-container">
      <div class="nav-left">
        <a href="home.html">Home</a>
        <a href="addproduct.html">Add Product</a>
        <a href="products.html" class="active">Inventory</a>
      </div>
      <button id="logout-btn" onclick="logout()">Logout</button>
    </nav>
  </header>

  <main>
    <div class="title-section">
        <h2>🛍️ Manage Products</h2>
        <p>Edit or remove items from your store inventory</p>
    </div>
    <div class="product-grid" id="product-grid"></div>
    <p id="no-products" class="no-products" style="display:none;">Inventory is currently empty.</p>
  </main>

  <div class="popup-overlay" id="delete-popup">
    <div class="popup">
      <h3 style="color:#eb4d4b; margin-bottom:15px;"><i class="fas fa-trash-alt"></i> Delete Product?</h3>
      <p style="color:#636e72; margin-bottom:25px;">Are you sure you want to delete <strong id="delete-product-name" style="color:#2d3436;"></strong>?</p>
      <div style="display:flex; gap:10px;">
        <button class="edit-btn" style="background:#eb4d4b;" id="confirm-delete">Yes, Delete</button>
        <button class="delete-btn" style="background:#f1f2f6; color:#2d3436;" onclick="closePopup()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="popup-overlay" id="edit-popup">
    <div class="edit-modal">
      <h3 style="margin-bottom:20px; color:#764ba2;"><i class="fas fa-edit"></i> Edit Details</h3>
      <input type="text" id="edit-name" placeholder="Product Name">
      
      <div id="size-price-container">
        <p style="font-weight:600; font-size:0.85rem; margin-bottom:10px;">Pricing & Sizes</p>
        <div id="size-list"></div>
        <button id="add-size" style="background:#f1f2f6; border:none; padding:10px; border-radius:10px; width:100%; cursor:pointer; margin-bottom:15px; font-weight:500;">+ Add New Size</button>
      </div>

      <input type="number" id="edit-quantity" placeholder="Quantity In Stock">
      <input type="text" id="edit-category" placeholder="Category">
      <textarea id="edit-desc" rows="3" placeholder="Product Description"></textarea>
      <input type="text" id="edit-image" placeholder="Image URL">
      
      <button class="edit-btn" id="save-edit" style="width:100%; padding:15px;">💾 Save Product Changes</button>
      <button onclick="closeEditPopup()" style="width:100%; background:none; border:none; margin-top:15px; color:#b2bec3; cursor:pointer;">Cancel Editing</button>
    </div>
  </div>

  <div class="success-popup" id="success-popup">
    <i class="fas fa-check-circle"></i> <span id="success-message">Updated!</span>
  </div>

  <script>
    // --- FUNCTIONS START (UNCHANGED LOGIC) ---
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let deleteIndex = null;
    let editIndex = null;
    let products = [];

    async function fetchProducts() {
      const res = await fetch("https://shopeasy-ecommerce-1-0bpu.onrender.com/api/products");
      products = await res.json();
      renderProducts();
    }

    function renderProducts() {
      const grid = document.getElementById("product-grid");
      const noProducts = document.getElementById("no-products");
      grid.innerHTML = "";

      if (!products || products.length === 0) {
        noProducts.style.display = "block";
        return;
      } else {
        noProducts.style.display = "none";
      }

      products.forEach((p, index) => {
        let priceDisplay = "";
        if (p.prices && Object.keys(p.prices).length > 0) {
          priceDisplay = Object.entries(p.prices)
            .map(([size, price]) => `<span class="price-pill">${size}: ₱${price.toFixed(2)}</span>`)
            .join("");
        } else {
          priceDisplay = "<span class='price-pill'>No prices listed</span>";
        }

        grid.innerHTML += `
          <div class="product">
            <img src="${p.image}" alt="${p.name}">
            <h3>${p.name}</h3>
            <div>${priceDisplay}</div>
            <p class="info-text"><strong>Category:</strong> ${p.category || "—"}</p>
            <p class="info-text"><strong>Stock:</strong> ${p.quantity || 0}</p>
            <div class="actions">
              <button class="edit-btn"a onclick="showEditPopup(${index})"><i class="fas fa-pen"></i> Edit</button>
              <button class="delete-btn" onclick="showDeletePopup(${index})"><i class="fas fa-trash-alt"></i></button>
            </div>
          </div>
        `;
      });
    }

    function showDeletePopup(index) {
      deleteIndex = index;
      document.getElementById("delete-product-name").textContent = products[index].name;
      document.getElementById("delete-popup").classList.add("show");
    }

    function closePopup() {
      document.getElementById("delete-popup").classList.remove("show");
    }

    document.getElementById("confirm-delete").addEventListener("click", async () => {
      const product = products[deleteIndex];
      const response = await fetch(`https://shopeasy-ecommerce-1-0bpu.onrender.com/api/products/${product._id}`, { method: "DELETE" });
      const result = await response.json();

      if (result.success) {
        showSuccess(`"${product.name}" deleted!`);
        await fetchProducts();
      }
      closePopup();
    });

    function showEditPopup(index) {
      editIndex = index;
      const p = products[index];

      document.getElementById("edit-name").value = p.name;
      document.getElementById("edit-quantity").value = p.quantity;
      document.getElementById("edit-category").value = p.category;
      document.getElementById("edit-desc").value = p.desc;
      document.getElementById("edit-image").value = p.image;

      const sizeList = document.getElementById("size-list");
      sizeList.innerHTML = "";
      const prices = p.prices || {};
      Object.entries(prices).forEach(([size, price]) => {
        const div = document.createElement("div");
        div.style.display = "flex"; div.style.gap = "8px"; div.style.marginBottom = "10px";
        div.innerHTML = `
          <input type="text" value="${size}" class="size-input" style="flex:1; margin-bottom:0;">
          <input type="number" value="${price}" class="price-input" style="flex:1; margin-bottom:0;">
          <button onclick="this.parentElement.remove()" style="background:none; border:none; color:#eb4d4b; cursor:pointer;"><i class="fas fa-times"></i></button>
        `;
        sizeList.appendChild(div);
      });

      document.getElementById("edit-popup").classList.add("show");
    }

    function closeEditPopup() {
      document.getElementById("edit-popup").classList.remove("show");
    }

    document.getElementById("add-size").addEventListener("click", () => {
      const div = document.createElement("div");
      div.style.display = "flex"; div.style.gap = "8px"; div.style.marginBottom = "10px";
      div.innerHTML = `
        <input type="text" placeholder="Size" class="size-input" style="flex:1; margin-bottom:0;">
        <input type="number" placeholder="Price" class="price-input" style="flex:1; margin-bottom:0;">
        <button onclick="this.parentElement.remove()" style="background:none; border:none; color:#eb4d4b; cursor:pointer;"><i class="fas fa-times"></i></button>
      `;
      document.getElementById("size-list").appendChild(div);
    });

    // FIXED SAVE FUNCTION (PUT REQUEST)
    document.getElementById("save-edit").addEventListener("click", async () => {
      const product = products[editIndex];
      if (!product || !product._id) {
          alert("Error: Product ID not found");
          return;
      }

      const updated = {
        name: document.getElementById("edit-name").value,
        quantity: parseInt(document.getElementById("edit-quantity").value) || 0,
        category: document.getElementById("edit-category").value,
        desc: document.getElementById("edit-desc").value,
        image: document.getElementById("edit-image").value,
        prices: {}
      };

      const sizeInputs = document.querySelectorAll(".size-input");
      const priceInputs = document.querySelectorAll(".price-input");
      sizeInputs.forEach((input, i) => {
        const size = input.value.trim();
        const price = parseFloat(priceInputs[i].value) || 0;
        if (size) updated.prices[size] = price;
      });

      const response = await fetch(`https://shopeasy-ecommerce-1-0bpu.onrender.com/api/products/${product._id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(updated)
      });

      const result = await response.json();
      if (result.success) {
        showSuccess("Product updated successfully!");
        await fetchProducts();
        closeEditPopup();
      } else {
        alert("Update failed: " + result.message);
      }
    });

    function showSuccess(message) {
      const popup = document.getElementById("success-popup");
      document.getElementById("success-message").textContent = message;
      popup.classList.add("show");
      setTimeout(() => popup.classList.remove("show"), 2500);
    }

    function logout() {
      localStorage.removeItem("isLoggedIn");
      window.location.href = "login.html";
    }

    fetchProducts();
  </script>
</body>
</html>
