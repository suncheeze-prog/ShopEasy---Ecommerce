<!-- ✅ header.html -->
<header style="font-family:'Segoe UI', sans-serif; background-color:#0078d7; color:white; padding:15px 0; box-shadow:0 4px 10px rgba(0,0,0,0.1); position:sticky; top:0; z-index:1000;">
  <div class="header-container" style="display:flex; align-items:center; justify-content:space-between; padding:0 20px; max-width:1200px; margin:auto;">
    
    <!-- 🍔 Hamburger + Bell + Title -->
    <div class="header-left" style="display:flex; align-items:center; gap:15px;">
      <button class="hamburger" style="font-size:1.8rem; cursor:pointer; color:white; background:none; border:none;" onclick="toggleSidebar()">☰</button>

      <!-- 🔔 Notification Bell -->
      <div class="bell-container" style="position:relative; display:inline-block; cursor:pointer;" onclick="showLowStockPopup()">
        <span class="bell-icon" style="font-size:1.8rem;">🔔</span>
        <span class="notification-badge" id="notification-badge" style="position:absolute; top:-5px; right:-5px; background-color:red; color:white; border-radius:50%; font-size:0.8rem; padding:2px 6px; display:none;">0</span>
      </div>

      <h1 style="margin:0; font-size:1.5rem;">ShopEasy</h1>
    </div>

    <!-- 🧭 Navigation -->
    <nav class="nav-container" style="display:flex; align-items:center; gap:20px;">
      <div class="nav-links" style="display:flex; gap:15px;">
        <a href="home.html" style="color:white; text-decoration:none;">Home</a>
        <a href="cart.html" style="color:white; text-decoration:none;">Cart (<span id="cart-count">0</span>)</a>
        <a href="addproduct.html" style="color:white; text-decoration:none;">Add Product</a>
        <a href="products.html" style="color:white; text-decoration:none;">Products</a>
        <a href="purchased.html" style="color:white; text-decoration:none;">Purchased</a>
        <a href="sales.html" style="color:white; text-decoration:none;">Sales</a>
        <a href="delivery.html" style="color:white; text-decoration:none;">Delivery</a>
        <a href="inventory.html" style="color:white; text-decoration:none;">Inventory</a>
        <a href="user.html" style="color:white; text-decoration:none;">Create Account</a>
      </div>

      <button id="logout-btn" style="background-color:white; color:#0078d7; border:none; padding:8px 16px; border-radius:8px; cursor:pointer;">Logout</button>
    </nav>
  </div>

  <style>
    a:hover { text-decoration:underline; color:#bde0ff; }
  </style>
</header>
