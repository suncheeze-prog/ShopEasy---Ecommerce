<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEasy - Supplier Delivery</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #764ba2;
      --secondary: #667eea;
      --accent: #43e97b;
      --glass: rgba(255, 255, 255, 0.95);
      --text-dark: #333;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding-bottom: 50px;
    }

    header {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .back-btn {
      background: white; color: var(--primary); border: none;
      padding: 8px 18px; border-radius: 20px; cursor: pointer;
      font-weight: 600; transition: 0.3s;
    }
    .back-btn:hover { transform: translateX(-5px); }

    .container {
      max-width: 1000px; margin: 40px auto;
      background: var(--glass); border-radius: 30px;
      padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }

    h2 { color: var(--primary); margin-bottom: 30px; font-weight: 700; }

    .delivery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .full-width { grid-column: span 2; }

    input, select, textarea {
      padding: 12px; border-radius: 12px; border: 2px solid #eee;
      font-size: 1rem; transition: 0.3s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--secondary); outline: none; }

    .submit-btn {
      background: linear-gradient(to right, var(--secondary), var(--primary));
      color: white; border: none; padding: 15px; border-radius: 12px;
      font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px;
    }
    .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

    .summary-section { margin-top: 50px; }
    .table-wrapper { overflow-x: auto; border-radius: 15px; border: 1px solid #eee; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th { background: #f8f9fa; padding: 15px; text-align: left; color: var(--primary); }
    td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; }

    .success-alert {
      display: none; background: #d1fae5; color: #065f46;
      padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center;
    }

    @media (max-width: 768px) { .delivery-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
  </style>
</head>
<body>

<header>
  <div style="font-size: 1.5rem; font-weight: 700;">ShopEasy</div>
  <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back</button>
</header>

<div class="container">
  <h2><i class="fas fa-shipping-fast"></i> Supplier Delivery Form</h2>

  <div class="success-alert" id="successMsg">✅ Supplier delivery and stock updated successfully!</div>

  <form id="deliveryForm">
    <div class="delivery-grid">
      <div class="form-group">
        <label>Supplier Name</label>
        <input type="text" id="supplierName" placeholder="Enter supplier name" required>
      </div>
      <div class="form-group">
        <label>Company</label>
        <input type="text" id="company" placeholder="Enter company name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter supplier email" required>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="phone" placeholder="Enter phone number" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      </div>
      <div class="form-group">
        <label>Select Product</label>
        <select id="productSelect" required>
          <option value="">-- Select a Product --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Number of Orders (Stock to Add)</label>
        <input type="number" id="orders" placeholder="Enter quantity" required min="1">
      </div>
      <div class="form-group full-width">
        <label>Delivery Notes</label>
        <textarea id="notes" placeholder="Enter delivery notes..."></textarea>
      </div>
    </div>
    <button type="submit" class="submit-btn">Submit Delivery</button>
  </form>

  <div class="summary-section">
    <h3 style="margin-bottom: 15px;">🧾 Supplier Information List</h3>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Supplier</th>
            <th>Company</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Product</th>
            <th>Orders</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="supplier-body">
          <tr><td colspan="7" style="text-align:center; color:#777;">No supplier records yet.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
    const supplierBody = document.getElementById("supplier-body");
    const productSelect = document.getElementById("productSelect");
    let suppliers = JSON.parse(localStorage.getItem("suppliers")) || [];
    let products = JSON.parse(localStorage.getItem("products")) || [];

    function loadProducts() {
      productSelect.innerHTML = '<option value="">-- Select a Product --</option>';
      products.forEach(p => {
        const option = document.createElement("option");
        option.value = p.name;
        option.textContent = p.name;
        productSelect.appendChild(option);
      });
    }

    function renderSuppliers() {
      supplierBody.innerHTML = "";
      if (suppliers.length === 0) {
        supplierBody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#777;">No supplier records yet.</td></tr>';
        return;
      }
      suppliers.forEach((s) => {
        const row = document.createElement("tr");
        row.innerHTML = `<td>${s.name}</td><td>${s.company}</td><td>${s.email}</td><td>${s.phone}</td><td>${s.product}</td><td>${s.orders}</td><td>${s.notes || "-"}</td>`;
        supplierBody.appendChild(row);
      });
    }

    document.getElementById("deliveryForm").addEventListener("submit", e => {
      e.preventDefault();
      const supplierName = document.getElementById("supplierName").value.trim();
      const company = document.getElementById("company").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const productName = document.getElementById("productSelect").value;
      const orders = parseInt(document.getElementById("orders").value);
      const notes = document.getElementById("notes").value.trim();

      // Save supplier record
      suppliers.push({ name: supplierName, company, email, phone, product: productName, orders, notes });
      localStorage.setItem("suppliers", JSON.stringify(suppliers));

      // Update inventory & product stock (Original Logic)
      let inventory = JSON.parse(localStorage.getItem("inventory")) || [];
      const productIndex = products.findIndex(p => p.name === productName);
      if (productIndex !== -1) {
        products[productIndex].quantity = (Number(products[productIndex].quantity) || 0) + orders;
      }

      const invIndex = inventory.findIndex(i => i.product === productName);
      if (invIndex !== -1) { inventory[invIndex].stock += orders; } 
      else { inventory.push({ product: productName, stock: orders }); }

      localStorage.setItem("inventory", JSON.stringify(inventory));
      localStorage.setItem("products", JSON.stringify(products));

      document.getElementById("deliveryForm").reset();
      renderSuppliers();
      const successMsg = document.getElementById("successMsg");
      successMsg.style.display = "block";
      setTimeout(() => successMsg.style.display = "none", 2500);
    });

    function goBack() { window.location.href = "home.html"; }
    loadProducts();
    renderSuppliers();
</script>
</body>
</html>
