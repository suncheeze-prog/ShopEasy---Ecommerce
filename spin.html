<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spin & Win - ShopEasy</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f7f9fc, #dce9f9);
      text-align: center;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    header, footer {
      background: #1e90ff;
      color: white;
      padding: 15px 0;
      animation: fadeDown 1s ease;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 80vh;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .wheel-container {
      position: relative;
      width: 300px;
      height: 300px;
      margin-bottom: 20px;
      animation: float 3s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 10px solid #fff;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      background: conic-gradient(
        #ff7675 0deg 45deg,
        #74b9ff 45deg 90deg,
        #55efc4 90deg 135deg,
        #ffeaa7 135deg 180deg,
        #a29bfe 180deg 225deg,
        #fab1a0 225deg 270deg,
        #81ecec 270deg 315deg,
        #fd79a8 315deg 360deg
      );
      transition: transform 6s cubic-bezier(.17,.67,.14,1.27);
    }
    
    .grayscale {
  filter: grayscale(1);
  opacity: 0.5;
}

    .wheel.spin-glow {
      box-shadow: 0 0 30px #1e90ff, 0 0 60px #1e90ff inset;
    }

    /* POINTER - moved inside */
    .pointer {
      position: absolute;
      top: 8px;        /* pointer now sits inside the wheel */
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 25px solid #e74c3c;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.1); }
    }

    #spinBtn {
      background: #1e90ff;
      color: white;
      border: none;
      padding: 12px 25px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    #spinBtn:hover {
      background: #005fcc;
      transform: scale(1.08);
    }

    .label {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
      pointer-events: none;
      transform: rotate(calc(var(--i) * 45deg)) translateY(-115px) rotate(calc(var(--i) * -45deg));
    }

    .home-btn {
      margin-top: 20px;
      background: #ff9f43;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    .home-btn:hover {
      background: #e67e22;
      transform: scale(1.05);
    }

    .result-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: white;
      border-radius: 12px;
      padding: 25px 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      opacity: 0;
      visibility: hidden;
      transition: 0.3s ease;
      z-index: 1000;
    }

    .result-popup.show {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    .confetti {
      position: fixed;
      width: 8px;
      height: 12px;
      top: -10px;
      left: 50%;
      opacity: 0.9;
      animation: fall 3s linear forwards;
    }



    @keyframes fall {
      0% { transform: translateY(-10px) rotate(0deg); }
      100% { transform: translateY(900px) rotate(360deg); }
    }
  </style>
</head>
<body>

<header>
  <h1>🎁 ShopEasy Spin & Win</h1>
</header>

<main>
  <div class="wheel-container">
    <div class="pointer"></div>

    <div class="wheel" id="wheel">
      <div class="label" style="--i:0">10% OFF</div>
      <div class="label" style="--i:1">Free Ship</div>
      <div class="label" style="--i:2">Try Again</div>
      <div class="label" style="--i:3">20% OFF</div>
      <div class="label" style="--i:4">Gift</div>
      <div class="label" style="--i:5">₱50</div>
      <div class="label" style="--i:6">5% OFF</div>
      <div class="label" style="--i:7">Better Luck</div>
    </div>
  </div>

  <button id="spinBtn">SPIN NOW</button>
  <a href="home.html" class="home-btn">🏠 Home</a>
</main>

<button id="resetBtn" style="
  margin-top: 10px;
  background: #ff4d4d;
  color: white;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
">RESET (TEST)</button>


<footer>
  <p>© 2025 ShopEasy | All Rights Reserved</p>
</footer>

<div class="result-popup" id="resultPopup">
  <h2 id="resultText">You won 10% OFF!</h2>
  <button onclick="closePopup()">OK</button>
</div>

<script>
  const wheel = document.getElementById("wheel");
  const resultPopup = document.getElementById("resultPopup");
  const resultText = document.getElementById("resultText");
  const spinBtn = document.getElementById("spinBtn");

  const prizes = [
    "🎉 10% OFF Coupon",
    "🎁 Free Shipping",
    "😢 Try Again",
    "🎉 20% OFF Coupon",
    "🎊 Free Gift",
    "🎉 ₱50 Voucher",
    "💥 5% OFF",
    "😢 Better Luck Next Time"
  ];

  const oneDay = 24 * 60 * 60 * 1000;

  /* ---------------------------------------
     CHECK DAILY SPIN ON PAGE LOAD
  ----------------------------------------*/
  function checkSpinStatus() {
    const lastSpin = localStorage.getItem("lastSpin");

    if (!lastSpin) {
      enableSpin();
      return;
    }

    const now = Date.now();
    const diff = now - Number(lastSpin);

    if (diff >= oneDay) {
      enableSpin();
    } else {
      const remaining = oneDay - diff;
      disableSpin();
      startCountdown(remaining);
    }
  }

  /* ---------------------------------------
        DISABLE SPIN (WITH GRAYSCALE)
  ----------------------------------------*/
  function disableSpin() {
    spinBtn.disabled = true;
    spinBtn.textContent = "Come Back Tomorrow!";
    wheel.classList.add("grayscale");   // <<-- FIXED (CSS class only)
  }

  /* ---------------------------------------
       ENABLE SPIN (REMOVE GRAYSCALE)
  ----------------------------------------*/
  function enableSpin() {
    spinBtn.disabled = false;
    spinBtn.textContent = "SPIN NOW";
    wheel.classList.remove("grayscale");
  }

  /* ---------------------------------------
           COUNTDOWN TIMER
  ----------------------------------------*/
  function startCountdown(timeLeft) {
    const timer = setInterval(() => {
      if (timeLeft <= 0) {
        clearInterval(timer);
        enableSpin();
        return;
      }

      timeLeft -= 1000;

      let h = Math.floor((timeLeft / (1000 * 60 * 60)));
      let m = Math.floor((timeLeft / (1000 * 60)) % 60);
      let s = Math.floor((timeLeft / 1000) % 60);

      spinBtn.textContent = `Come Back in ${h}h ${m}m ${s}s`;
    }, 1000);
  }

  /* ---------------------------------------
                 SPIN LOGIC
  ----------------------------------------*/
  spinBtn.addEventListener("click", () => {
    if (spinBtn.disabled) return;

    spinBtn.disabled = true;
    wheel.classList.add("spin-glow");

    const randomDegree = 7200 + Math.floor(Math.random() * 360);
    wheel.style.transform = `rotate(${randomDegree}deg)`;

    setTimeout(() => {
      wheel.classList.remove("spin-glow");

      const normalized = randomDegree % 360;
      const segment = Math.floor(normalized / 45);
      const prize = prizes[7 - segment];

      resultText.textContent = `🎊 ${prize}!`;
      resultPopup.classList.add("show");
      createConfetti();

      localStorage.setItem("lastSpin", Date.now());
      disableSpin();
      startCountdown(oneDay);

    }, 6000);
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
  localStorage.removeItem("lastSpin");
  enableSpin();
  spinBtn.textContent = "SPIN NOW";
  alert("Spin reset! You can spin again now.");
});


  /* ---------------------------------------
              CONFETTI EFFECT
  ----------------------------------------*/
  function createConfetti() {
    for (let i = 0; i < 40; i++) {
      const confetti = document.createElement("div");
      confetti.classList.add("confetti");
      confetti.style.left = Math.random() * window.innerWidth + "px";
      confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
      confetti.style.animationDuration = (2 + Math.random() * 1.5) + "s";
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 3500);
    }
  }

  /* ---------------------------------------
                 CLOSE POPUP
  ----------------------------------------*/
  function closePopup() {
    resultPopup.classList.remove("show");
  }

  // RUN ON PAGE LOAD
  checkSpinStatus();
</script>



</body>
</html>
