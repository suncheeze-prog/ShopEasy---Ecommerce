<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEasy - Seller Order Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #764ba2;
      --secondary: #667eea;
      --glass: rgba(255, 255, 255, 0.95);
      --success: #00b894;
      --pending: #f39c12;
      --shipped: #3498db;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 30px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--glass);
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-bottom: 2px solid #eee;
      padding-bottom: 20px;
    }

    h2 { color: var(--primary); font-weight: 700; }

    .btn-home {
      text-decoration: none;
      background: var(--secondary);
      color: white;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 0.9rem;
      transition: 0.3s;
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }

    /* Debug Panel */
    .debug-panel {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 0.85rem;
    }

    .debug-panel h4 {
      color: #856404;
      margin-bottom: 10px;
    }

    .debug-panel pre {
      background: white;
      padding: 10px;
      border-radius: 5px;
      overflow-x: auto;
      font-size: 0.75rem;
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }

    .stat-card h3 {
      font-size: 2rem;
      margin-bottom: 5px;
    }

    .stat-card p {
      font-size: 0.85rem;
      opacity: 0.9;
    }

    /* Table Design */
    .table-responsive { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 0.85rem; color: #666; border-bottom: 2px solid #eee; }
    td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; color: #444; }

    .customer-info { font-weight: 600; color: var(--primary); margin-bottom: 3px; }
    .product-name { font-size: 0.8rem; color: #7f8c8d; }

    /* Badge and Select */
    .status-badge {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        margin-bottom: 5px;
        display: inline-block;
    }
    .status-Pending { background: #fff3cd; color: #856404; }
    .status-Packed { background: #cfe2ff; color: #084298; }
    .status-Shipped { background: #d1e7dd; color: #0f5132; }
    .status-OutforDelivery { background: #e7d1ff; color: #6c0eb8; }
    .status-Delivered { background: #d4edda; color: #155724; }

    .status-select {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 0.85rem;
      width: 100%;
      outline: none;
    }

    .btn-update {
      background: var(--success);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
      width: 100%;
    }
    .btn-update:hover { transform: scale(1.05); }

    .empty-msg { 
      text-align: center; 
      padding: 100px 0; 
      color: #aaa; 
    }

    .loading {
      text-align: center;
      padding: 50px;
      color: #667eea;
      font-size: 1.2rem;
    }

    .loading i {
      font-size: 3rem;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h2><i class="fas fa-clipboard-list"></i> Seller Order Panel</h2>
    <a href="home.html" class="btn-home"><i class="fas fa-arrow-left"></i> Home</a>
  </header>

  <!-- Debug Panel (Can be removed in production) -->
  <div class="debug-panel" id="debugPanel">
    <h4><i class="fas fa-bug"></i> Debug Information</h4>
    <div id="debugContent">Loading...</div>
  </div>

  <!-- Stats Cards -->
  <div class="stats-grid" id="statsGrid" style="display: none;">
    <div class="stat-card">
      <h3 id="totalOrders">0</h3>
      <p>Total Orders</p>
    </div>
    <div class="stat-card">
      <h3 id="pendingOrders">0</h3>
      <p>Pending</p>
    </div>
    <div class="stat-card">
      <h3 id="deliveredOrders">0</h3>
      <p>Delivered</p>
    </div>
  </div>

  <!-- Loading State -->
  <div class="loading" id="loadingState">
    <i class="fas fa-spinner"></i>
    <p>Loading orders...</p>
  </div>

  <!-- Table -->
  <div class="table-responsive" id="tableContainer" style="display: none;">
    <table id="orders-table">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer & Product</th>
          <th>Qty</th>
          <th>Total</th>
          <th>Date Ordered</th>
          <th>Current Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="seller-orders-list"></tbody>
    </table>
  </div>

  <!-- Empty State -->
  <div id="no-orders" class="empty-msg" style="display:none;">
    <i class="fas fa-box-open" style="font-size: 3rem; margin-bottom: 10px;"></i>
    <p>No orders found for your shop.</p>
  </div>
</div>

<script>
// =====================
// LOAD SELLER ORDERS
// =====================
async function loadSellerOrders() {
  const sellerId = localStorage.getItem("userId");
  const role = localStorage.getItem("role");
  
  // Debug info
  const debugContent = document.getElementById("debugContent");
  debugContent.innerHTML = `
    <strong>Seller ID:</strong> ${sellerId || "❌ Not found"}<br>
    <strong>Role:</strong> ${role || "❌ Not found"}<br>
    <strong>API Endpoint:</strong> https://shopeasy-ecommerce-1-0bpu.onrender.com/api/seller/orders?sellerId=${sellerId}
  `;
  
  console.log("=== SELLER ORDER DEBUG ===");
  console.log("Seller ID:", sellerId);
  console.log("Role:", role);
  
  if (!sellerId) {
    alert("❌ You need to be logged in as a seller!");
    window.location.href = "login.html";
    return;
  }
  
  if (role !== "seller") {
    alert("⚠️ This page is only accessible to sellers!");
    window.location.href = "home.html";
    return;
  }
  
  const loadingState = document.getElementById("loadingState");
  const tableContainer = document.getElementById("tableContainer");
  const noOrders = document.getElementById("no-orders");
  const statsGrid = document.getElementById("statsGrid");
  
  loadingState.style.display = "block";
  tableContainer.style.display = "none";
  noOrders.style.display = "none";
  
  try {
    console.log("📡 Fetching orders from API...");
    
    const res = await fetch(`https://shopeasy-ecommerce-1-0bpu.onrender.com/api/seller/orders?sellerId=${sellerId}`);
    
    console.log("📥 Response status:", res.status);
    
    const data = await res.json();
    
    console.log("📦 Orders data received:", data);
    console.log("Number of orders:", data.length || 0);
    
    // Update debug panel
    debugContent.innerHTML += `<br><strong>Orders Found:</strong> ${data.length || 0}`;
    
    if (data.length > 0) {
      debugContent.innerHTML += `<br><pre>${JSON.stringify(data[0], null, 2)}</pre>`;
    }
    
    loadingState.style.display = "none";
    
    const tbody = document.getElementById("seller-orders-list");
    tbody.innerHTML = "";
    
    if (!data || data.length === 0) {
      noOrders.style.display = "block";
      console.log("❌ No orders found for seller:", sellerId);
      return;
    }
    
    // Show table and stats
    tableContainer.style.display = "block";
    statsGrid.style.display = "grid";
    
    // Calculate stats
    let totalOrders = data.length;
    let pendingOrders = data.filter(o => o.status === "Pending").length;
    let deliveredOrders = data.filter(o => o.status === "Delivered").length;
    
    document.getElementById("totalOrders").textContent = totalOrders;
    document.getElementById("pendingOrders").textContent = pendingOrders;
    document.getElementById("deliveredOrders").textContent = deliveredOrders;
    
    // Render orders
    data.forEach(order => {
      const tr = document.createElement("tr");
      const displayDate = order.date ? order.date.split(',')[0] : new Date().toLocaleDateString();
      const statusClass = order.status.replace(/\s+/g, '');
      
      tr.innerHTML = `
        <td style="font-family: monospace; font-size: 0.75rem;">#${order._id.slice(-6).toUpperCase()}</td>
        <td>
          <div class="customer-info"><i class="fas fa-user-circle"></i> ${order.customerName || order.userId || "Anonymous Buyer"}</div>
          <div class="product-name"><i class="fas fa-tag"></i> ${order.name || "Product"}</div>
        </td>
        <td style="text-align:center;">${order.quantity || 1}</td>
        <td style="font-weight: 700; color: #2d3436;">₱${((order.price || 0) * (order.quantity || 1)).toLocaleString()}</td>
        <td>${displayDate}</td>
        <td>
          <span class="status-badge status-${statusClass}">${order.status || "Pending"}</span>
          <select id="status-${order._id}" class="status-select">
            <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>Pending</option>
            <option value="Packed" ${order.status === 'Packed' ? 'selected' : ''}>Packed</option>
            <option value="Shipped" ${order.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
            <option value="Out for Delivery" ${order.status === 'Out for Delivery' ? 'selected' : ''}>Out for Delivery</option>
            <option value="Delivered" ${order.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
          </select>
        </td>
        <td>
          <button class="btn-update" onclick="updateStatus('${order._id}')">
            <i class="fas fa-save"></i> Update
          </button>
        </td>
      `;
      tbody.appendChild(tr);
    });
    
    console.log("✅ Orders loaded successfully!");
    
  } catch (error) {
    console.error("❌ Error loading orders:", error);
    loadingState.style.display = "none";
    noOrders.style.display = "block";
    
    debugContent.innerHTML += `<br><strong style="color: red;">Error:</strong> ${error.message}`;
    
    alert("Failed to load orders. Check console for details.");
  }
}

// =====================
// UPDATE ORDER STATUS
// =====================
async function updateStatus(orderId) {
  const newStatus = document.getElementById(`status-${orderId}`).value;
  
  console.log("Updating order:", orderId, "to status:", newStatus);
  
  try {
    const res = await fetch(`https://shopeasy-ecommerce-1-0bpu.onrender.com/api/orders/update-status`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ orderId, status: newStatus })
    });
    
    const result = await res.json();
    
    console.log("Update response:", result);

    if (res.ok && result.success) {
      alert("✅ Order status updated to: " + newStatus);
      loadSellerOrders(); // Refresh table
    } else {
      alert("❌ Failed to update status: " + (result.message || "Unknown error"));
    }
  } catch (error) {
    console.error("Update error:", error);
    alert("Connection error. Please try again.");
  }
}

// =====================
// INITIAL LOAD
// =====================
document.addEventListener("DOMContentLoaded", () => {
  loadSellerOrders();
});
</script>
</body>
</html>
