<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEasy - Your Premium Cart</title>
  <link rel="icon" type="img/shopping.png" href="img/shopping.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #764ba2;
      --secondary: #667eea;
      --white: #ffffff;
      --glass: rgba(255, 255, 255, 0.9);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
      padding-bottom: 50px;
    }

    header {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 20px 5%;
      text-align: center;
      color: white;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    header h1 { font-size: 1.8rem; font-weight: 600; }
    header nav a { color: rgba(255,255,255,0.9); text-decoration: none; font-size: 0.9rem; transition: 0.3s; margin: 0 10px; }
    header nav a:hover { color: white; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      background: var(--glass);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.5);
    }

    /* Table Design */
    .table-responsive { overflow-x: auto; border-radius: 20px; background: white; margin-bottom: 30px; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th { background: #f8f9fa; color: var(--primary); padding: 15px; text-align: left; font-weight: 600; border-bottom: 2px solid #eee; text-transform: uppercase; font-size: 0.8rem; }
    td { padding: 15px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    
    td img { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; border: 1px solid #eee; }

    .btn-remove { background: #ff4757; color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 0.8rem; }
    .btn-remove:hover { background: #ff6b81; transform: scale(1.05); }

    .select-item { transform: scale(1.3); cursor: pointer; accent-color: var(--primary); }

    /* Summary & VAT Section */
    .bottom-section { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px; }
    
    .vat-box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 10px; }
    .vat-box input { width: 70px; padding: 10px; border: 2px solid #eee; border-radius: 10px; text-align: center; outline: none; }
    .vat-box button { background: var(--secondary); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
    .vat-box button:hover { background: var(--primary); }

    .cart-summary { text-align: right; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); min-width: 300px; }
    .cart-summary h3 { color: var(--primary); font-size: 1.4rem; margin-bottom: 15px; }

    .action-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px; }
    .btn-clear { background: #f1f2f6; color: #57606f; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 500; transition: 0.3s; }
    .btn-clear:hover { background: #dfe4ea; }
    .btn-checkout { background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; border: none; padding: 12px 30px; border-radius: 12px; cursor: pointer; font-weight: 600; box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3); transition: 0.3s; }
    .btn-checkout:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(118, 75, 162, 0.4); }

    /* Popups */
    .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.3s; z-index: 1000; }
    .popup-overlay.show { visibility: visible; opacity: 1; }
    .popup { background: white; padding: 40px; border-radius: 25px; text-align: center; max-width: 400px; width: 90%; transform: scale(0.8); transition: 0.3s; }
    .popup-overlay.show .popup { transform: scale(1); }
    .popup h2 { color: var(--primary); margin-bottom: 10px; }
    .popup .icon { font-size: 4rem; color: #2ecc71; margin-bottom: 15px; }

    @media (max-width: 768px) {
      .bottom-section { flex-direction: column; }
      .cart-summary, .vat-box { width: 100%; text-align: center; justify-content: center; }
      .action-btns { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <h1><i class="fas fa-shopping-cart"></i> Your Shopping Cart</h1>
  <nav>
    <a href="home.html"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
    <a href="delivery-tracking.html"><i class="fas fa-shipping-fast"></i> Track Orders</a>
  </nav>
</header>

<div class="container">
  <div class="table-responsive">
    <table id="cart-table">
      <thead>
        <tr>
          <th>Select</th>
          <th>Image</th>
          <th>Product</th>
          <th>Size</th>
          <th>Price</th>
          <th>Qty</th>
          <th>Subtotal</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="cart-items"></tbody>
    </table>
  </div>

  <div class="bottom-section">
    <div class="vat-box">
      <label><i class="fas fa-percent"></i> VAT:</label>
      <input type="number" id="vat-input" min="0" max="100" placeholder="0">
      <button id="apply-vat">Apply</button>
    </div>

    <div class="cart-summary">
      <h3>Total: ₱<span id="cart-total">0.00</span></h3>
      <div class="action-btns">
        <button class="btn-clear" id="clear-cart">Clear All</button>
        <button class="btn-checkout" id="checkoutBtn">Checkout Selected</button>
      </div>
    </div>
  </div>
</div>

<div class="popup-overlay" id="confirm-popup">
  <div class="popup">
    <h2>🧹 Clear Cart?</h2>
    <p>This will remove all items from your cart.</p>
    <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
      <button class="btn-checkout" onclick="confirmClearCart()">Yes, Clear</button>
      <button class="btn-clear" onclick="cancelClearCart()">Cancel</button>
    </div>
  </div>
</div>

<div class="popup-overlay" id="checkout-popup">
  <div class="popup">
    <div class="icon"><i class="fas fa-check-circle"></i></div>
    <h2>Order Success!</h2>
    <p>Redirecting you to delivery tracking...</p>
  </div>
</div>

<script>
let cart = [];
let appliedVAT = 0;
const userId = localStorage.getItem("userId");

async function loadCartFromDB() {
  if (!userId) { 
    alert("Please login first!");
    window.location.href = "login.html"; 
    return; 
  }
  try {
    const response = await fetch(`https://shopeasy-ecommerce-1-0bpu.onrender.com/api/cart/${userId}`);
    const data = await response.json();
    cart = data.success ? (data.items || []) : [];
    renderCart();
  } catch (error) { 
    console.error("❌ Error loading cart:", error); 
    renderCart(); 
  }
}

function renderCart() {
  const cartItems = document.getElementById("cart-items");
  cartItems.innerHTML = "";
  if (cart.length === 0) {
    cartItems.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:50px; color:#aaa;">Your cart feels lonely. Add some products!</td></tr>';
    document.getElementById("cart-total").textContent = "0.00";
    return;
  }
  let total = 0;
  cart.forEach((item, index) => {
    const qty = item.orderQty || 1;
    const price = Number(item.selectedPrice || item.price || 0);
    const subtotal = price * qty;
    const subtotalWithVAT = subtotal + (subtotal * (appliedVAT / 100));
    total += subtotalWithVAT;
    
    const row = document.createElement("tr");
    row.innerHTML = `
      <td><input type="checkbox" class="select-item" data-index="${index}" checked></td>
      <td><img src="${item.image || 'placeholder.png'}" alt="${item.name}"></td>
      <td style="font-weight:500;">${item.name}</td>
      <td><span style="background:#eee; padding:3px 8px; border-radius:5px; font-size:0.8rem;">${item.size || "N/A"}</span></td>
      <td>₱${price.toLocaleString()}</td>
      <td>${qty}</td>
      <td style="font-weight:600; color:var(--primary);">₱${subtotalWithVAT.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
      <td><button class="btn-remove" onclick="removeItem('${item._id}')"><i class="fas fa-trash"></i></button></td>
    `;
    cartItems.appendChild(row);
  });
  document.getElementById("cart-total").textContent = total.toLocaleString(undefined, {minimumFractionDigits: 2});
}

async function removeItem(itemId) {
  try {
    const response = await fetch(`https://shopeasy-ecommerce-1-0bpu.onrender.com/api/cart/remove/${userId}/${itemId}`, { method: "DELETE" });
    const data = await response.json();
    if (data.success) { 
      cart = data.items; 
      renderCart(); 
    }
  } catch (error) { 
    alert("Error removing item"); 
    console.error(error);
  }
}

document.getElementById("clear-cart").addEventListener("click", () => {
  if (cart.length === 0) {
    alert("Cart is already empty!");
    return;
  }
  document.getElementById("confirm-popup").classList.add("show");
});

async function confirmClearCart() {
  try {
    await fetch(`https://shopeasy-ecommerce-1-0bpu.onrender.com/api/cart/clear/${userId}`, { method: "DELETE" });
    cart = []; 
    renderCart();
    document.getElementById("confirm-popup").classList.remove("show");
  } catch (error) {
    console.error("Error clearing cart:", error);
  }
}

function cancelClearCart() { 
  document.getElementById("confirm-popup").classList.remove("show"); 
}

document.getElementById("apply-vat").addEventListener("click", () => {
  const vat = Number(document.getElementById("vat-input").value) || 0;
  if (vat < 0 || vat > 100) {
    alert("VAT must be between 0 and 100");
    return;
  }
  appliedVAT = vat;
  renderCart();
});

async function checkout() {
  const checkboxes = document.querySelectorAll(".select-item:checked");
  if (checkboxes.length === 0) { 
    alert("Please select at least one item to checkout!"); 
    return; 
  }

  const selectedItems = Array.from(checkboxes).map(cb => cart[cb.dataset.index]);
  
  // Format date nicely
  const now = new Date();
  const formattedDate = now.toLocaleDateString('en-US', { 
    year: 'numeric', 
    month: 'short', 
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });

  const purchaseData = selectedItems.map(item => {
    const price = Number(item.selectedPrice || item.price || 0);
    const qty = Number(item.orderQty || 1);
    const baseTotal = price * qty;
    const totalWithVAT = baseTotal + (baseTotal * (appliedVAT / 100));
    
    return {
      userId: userId,
      name: item.name || "Unknown Product",
      image: item.image || "placeholder.png",
      price: price,
      quantity: qty,
      size: item.size || item.selectedSize || "Standard",
      vat: appliedVAT,
      totalAmount: Number(totalWithVAT.toFixed(2)),
      status: "Pending",
      date: formattedDate,
      createdAt: now.toISOString()
    };
  });

  console.log("📦 Checkout Data:", purchaseData); // Debug log

  try {
    const response = await fetch("https://shopeasy-ecommerce-1-0bpu.onrender.com/api/purchased/add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ items: purchaseData })
    });

    const result = await response.json();

    if (response.ok && result.success) {
      // Remove purchased items from cart
      for (const item of selectedItems) {
        await fetch(`https://shopeasy-ecommerce-1-0bpu.onrender.com/api/cart/remove/${userId}/${item._id}`, { method: "DELETE" });
      }
      
      // Show success popup
      document.getElementById("checkout-popup").classList.add("show");
      
      // Redirect to tracking page
      setTimeout(() => { 
        window.location.href = "delivery-tracking.html"; 
      }, 2000);
    } else {
      alert("Checkout failed: " + (result.message || "Unknown error"));
    }
  } catch (error) { 
    console.error("Checkout error:", error);
    alert("Checkout failed! Please try again."); 
  }
}

document.getElementById("checkoutBtn").addEventListener("click", checkout);

// Load cart on page load
loadCartFromDB();
</script>
</body>
</html>
