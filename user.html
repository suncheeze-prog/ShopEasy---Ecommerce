<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | ShopEasy</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", sans-serif;
      min-height: 100vh;
      background: linear-gradient(-45deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      display: flex;
      flex-direction: column;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    header {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 20px 0;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 30px;
    }

    h1 {
      color: white;
      font-size: 2rem;
      font-weight: 700;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 25px;
      font-weight: 500;
      transition: all 0.3s;
      position: relative;
    }

    nav a:after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background: white;
      transition: width 0.3s;
    }

    nav a:hover:after, nav a.active:after {
      width: 100%;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 40px 20px;
    }

    .register-container {
      max-width: 550px;
      margin: 0 auto;
      padding: 45px 50px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.5);
      animation: slideUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      position: relative;
      overflow: hidden;
    }

    .register-container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(118, 75, 162, 0.1), transparent);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    @keyframes slideUp {
      from { 
        opacity: 0; 
        transform: translateY(40px) scale(0.95); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0) scale(1); 
      }
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.2rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .profile-container {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }

    .profile-preview {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid transparent;
      background: linear-gradient(white, white) padding-box,

      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      margin-bottom: 15px;
      transition: all 0.4s;
      cursor: pointer;
    }

    .profile-preview:hover {

      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
    }

    .upload-label {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 10px 25px;
      border-radius: 25px;
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-block;
      transition: all 0.3s;
      font-weight: 600;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .upload-label:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
    }

    #profile-pic {
      display: none;
    }

    .form-group {
      position: relative;
      margin-bottom: 25px;
      z-index: 1;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #4a5568;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    input, textarea, select {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 15px;
      font-size: 1rem;
      transition: all 0.3s;
      background: white;
      font-family: inherit;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
      outline: none;
      transform: translateY(-2px);
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    button {
      padding: 16px;
      width: 100%;
      border: none;
      border-radius: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.4s;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
    }

    button:active {
      transform: translateY(-1px);
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.95rem;
      color: #4a5568;
      position: relative;
      z-index: 1;
    }

    .login-link a {
      color: #667eea;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s;
    }

    .login-link a:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    .success-message, .error-message {
      display: none;
      padding: 15px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: 600;
      animation: slideDown 0.4s ease;
      position: relative;
      z-index: 1;
    }

    @keyframes slideDown {
      from { 
        opacity: 0; 
        transform: translateY(-10px); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }

    .success-message { 
      background: linear-gradient(135deg, #d4edda, #c3e6cb);
      color: #155724;
      border: 2px solid #28a745;
    }

    .error-message { 
      background: linear-gradient(135deg, #f8d7da, #f5c6cb);
      color: #721c24;
      border: 2px solid #dc3545;
    }

    footer {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      text-align: center;
      color: white;
      font-weight: 500;
      margin-top: auto;
    }

    @media (max-width: 600px) {
      .register-container {
        padding: 35px 30px;
        margin: 20px;
      }

      h2 {
        font-size: 1.8rem;
      }

      .header-container {
        flex-direction: column;
        text-align: center;
      }

      nav {
        margin-top: 15px;
      }

      nav a {
        margin: 0 10px;
      }
    }
  </style>
</head>

let cropper;
let croppedImageData = "";

profileInput.addEventListener("change", function () {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function () {
    const cropContainer = document.getElementById("crop-container");
    cropContainer.classList.remove("hidden");

    const cropImage = document.getElementById("crop-image");
    cropImage.src = reader.result;

    if (cropper) cropper.destroy();

    cropper = new Cropper(cropImage, {
      aspectRatio: 1,        // Keep square for circle
      viewMode: 1,
      dragMode: "move",
      movable: true,
      zoomable: true,
      rotatable: false,
      scalable: false,
      background: false,
      guides: false,
      modal: true,
      autoCrop: true,
      autoCropArea: 1,
    });
  };
  reader.readAsDataURL(file);
});

document.getElementById("crop-btn").addEventListener("click", function () {
  if (!cropper) return;

  const canvas = cropper.getCroppedCanvas({ width: 200, height: 200 });
  const circleCanvas = document.createElement("canvas");
  circleCanvas.width = canvas.width;
  circleCanvas.height = canvas.height;
  const ctx = circleCanvas.getContext("2d");

  // Circular mask
  ctx.beginPath();
  ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2, 0, Math.PI * 2);
  ctx.closePath();
  ctx.clip();

  ctx.drawImage(canvas, 0, 0);

  croppedImageData = circleCanvas.toDataURL("image/png");
  profilePreview.src = croppedImageData;

  document.getElementById("crop-container").classList.add("hidden");
  cropper.destroy();
  cropper = null;
});



</script>
