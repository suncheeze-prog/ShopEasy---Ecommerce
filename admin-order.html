<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Order Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #64748b;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --glass: rgba(255, 255, 255, 0.95);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

    body {
      background: #f1f5f9;
      background-image: var(--bg-gradient);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
    }

    /* Mobile Menu Toggle */
    .menu-toggle {
      display: none;
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1001;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      width: 45px;
      height: 45px;
      border-radius: 12px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: 0.3s;
    }

    .menu-toggle:hover { background: rgba(255, 255, 255, 0.3); }

    /* Sidebar Navigation */
    .sidebar {
      width: 260px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 30px 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .sidebar-header h2 { font-size: 1.5rem; letter-spacing: 1px; }

    .nav-links { list-style: none; padding: 20px; flex-grow: 1; }
    .nav-links li { margin-bottom: 10px; }
    .nav-links a {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 20px;
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      border-radius: 12px;
      transition: 0.3s;
    }

    .nav-links a:hover, .nav-links a.active {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      transform: translateX(5px);
    }

    /* Main Content Area */
    .main-content {
      flex-grow: 1;
      margin-left: 260px;
      padding: 30px;
      width: calc(100% - 260px);
      transition: margin-left 0.3s ease, width 0.3s ease;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      color: white;
      flex-wrap: wrap;
      gap: 15px;
    }

    .admin-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.2);
      padding: 8px 18px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--glass);
      padding: 25px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: 0.3s ease;
    }

    .stat-card:hover { transform: translateY(-5px); }
    .stat-icon {
      width: 60px;
      height: 60px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: white;
    }

    /* Orders Section */
    .orders-section {
      background: var(--glass);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .table-controls {
      display: flex;
      gap: 15px;
      flex-grow: 1;
      flex-wrap: wrap;
    }

    .search-wrapper {
      position: relative;
      min-width: 300px;
      flex: 1;
    }

    .search-wrapper i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
    }

    .search-wrapper input {
      width: 100%;
      padding: 12px 15px 12px 45px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      outline: none;
      transition: 0.3s;
    }

    .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      padding: 10px 18px;
      border: 1px solid #e2e8f0;
      background: white;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: 0.2s;
    }

    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* Table Design */
    .table-responsive { border-radius: 15px; overflow-x: auto; border: 1px solid #f1f5f9; }
    table { width: 100%; border-collapse: collapse; background: white; min-width: 800px; }
    th { background: #f8fafc; padding: 15px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: #64748b; letter-spacing: 0.05em; border-bottom: 2px solid #edf2f7; white-space: nowrap; }
    td { padding: 16px 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; color: #1e293b; }

    /* Status Badges */
    .status-badge {
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: capitalize;
      white-space: nowrap;
    }

    .pending { background: #fef3c7; color: #92400e; }
    .packed { background: #e0e7ff; color: #3730a3; }
    .shipped { background: #e0f2fe; color: #075985; }
    .delivered { background: #dcfce7; color: #166534; }
    .cancelled { background: #fee2e2; color: #991b1b; }

    /* Action Buttons */
    .status-select {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-size: 0.85rem;
      outline: none;
      min-width: 120px;
    }

    .btn-update {
      background: var(--primary);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .btn-update:hover:not(:disabled) { background: var(--primary-dark); transform: scale(1.05); }
    .btn-update:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-view {
      background: #f1f5f9;
      color: #475569;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .btn-view:hover { background: #e2e8f0; color: var(--primary); }

    /* --- POPUP (MODAL) STYLING --- */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }

    .modal.show { display: flex; animation: fadeIn 0.3s ease; }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 550px;
      border-radius: 24px;
      padding: 35px;
      position: relative;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      border-bottom: 1px solid #f1f5f9;
      padding-bottom: 15px;
    }

    .modal-header h3 { color: var(--primary); font-size: 1.4rem; }

    .close-modal {
      background: #f1f5f9;
      border: none;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      color: #64748b;
      transition: 0.3s;
    }

    .close-modal:hover { background: var(--danger); color: white; }

    .order-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .info-item {
      background: #f8fafc;
      padding: 12px 15px;
      border-radius: 15px;
      border: 1px solid #f1f5f9;
    }

    .info-item label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #94a3b8;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .info-item p { font-weight: 500; color: #1e293b; font-size: 0.95rem; word-break: break-word; }

    /* --- TOAST STYLING --- */
    .toast {
      position: fixed;
      top: 30px;
      right: 30px;
      background: white;
      padding: 15px 25px;
      border-radius: 16px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 2000;
      transform: translateX(150%);
      transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      border-left: 5px solid var(--primary);
      max-width: 350px;
    }

    .toast.show { transform: translateX(0); }
    .toast.success { border-left-color: var(--success); }
    .toast.error { border-left-color: var(--danger); }
    .toast i { font-size: 1.5rem; }
    .toast.success i { color: var(--success); }
    .toast.error i { color: var(--danger); }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Loading Spinner */
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 10px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Tablet Responsive (768px - 1024px) */
    @media (max-width: 1024px) {
      .sidebar { width: 80px; }
      .sidebar-header h2 span, .nav-links span { display: none; }
      .main-content { margin-left: 80px; width: calc(100% - 80px); }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* Mobile Responsive (below 768px) */
    @media (max-width: 768px) {
      .menu-toggle { display: flex; }
      
      .sidebar {
        transform: translateX(-100%);
        width: 260px;
        box-shadow: 5px 0 15px rgba(0,0,0,0.1);
      }

      .sidebar.active { transform: translateX(0); }
      
      .sidebar-header h2 span, .nav-links span { display: inline; }

      .main-content {
        margin-left: 0;
        width: 100%;
        padding: 80px 15px 20px;
      }

      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .admin-profile {
        align-self: flex-end;
        font-size: 0.9rem;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .stat-card {
        padding: 15px;
        gap: 12px;
      }

      .stat-icon {
        width: 45px;
        height: 45px;
        font-size: 1.2rem;
      }

      .stat-card h3 { font-size: 1.3rem; }
      .stat-card p { font-size: 0.85rem; }

      .orders-section { 
        padding: 20px 15px; 
        border-radius: 16px;
      }

      .section-header { flex-direction: column; align-items: stretch; }

      .table-controls { flex-direction: column; }

      .search-wrapper { min-width: 100%; }

      .filter-group {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 5px;
      }

      .filter-btn {
        padding: 8px 14px;
        font-size: 0.8rem;
        white-space: nowrap;
      }

      .table-responsive {
        border-radius: 12px;
        -webkit-overflow-scrolling: touch;
      }

      table { font-size: 0.85rem; }
      th { padding: 12px 10px; font-size: 0.7rem; }
      td { padding: 12px 10px; }

      .status-select { 
        font-size: 0.8rem;
        min-width: 100px;
      }

      .btn-update, .btn-view {
        width: 36px;
        height: 36px;
      }

      .modal-content {
        padding: 25px 20px;
        max-width: 100%;
        border-radius: 20px;
      }

      .modal-header h3 { font-size: 1.2rem; }

      .order-info-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .toast {
        top: auto;
        bottom: 20px;
        right: 15px;
        left: 15px;
        max-width: 100%;
      }
    }

    /* Extra Small Mobile (below 480px) */
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      
      .filter-btn { padding: 7px 12px; font-size: 0.75rem; }

      .modal-content { padding: 20px 15px; }

      header h1 { font-size: 1.5rem; }
    }

    /* Sidebar Overlay for Mobile */
    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 99;
    }

    .sidebar-overlay.active { display: block; }

    @media (max-width: 768px) {
      .sidebar-overlay { display: none; }
      .sidebar-overlay.active { display: block; }
    }
  </style>
</head>
<body>

<!-- Mobile Menu Toggle -->
<button class="menu-toggle" onclick="toggleSidebar()">
  <i class="fas fa-bars"></i>
</button>

<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2><i class="fas fa-shop"></i> <span>ShopEasy</span></h2>
  </div>
  <ul class="nav-links">
    <li><a href="home.html" onclick="closeSidebarMobile()"><i class="fas fa-home"></i> <span>Home</span></a></li>
    <li><a href="#" class="active" onclick="closeSidebarMobile()"><i class="fas fa-shopping-cart"></i> <span>Orders</span></a></li>
    <li><a href="products.html" onclick="closeSidebarMobile()"><i class="fas fa-box"></i> <span>Products</span></a></li>
    <li><a href="users.html" onclick="closeSidebarMobile()"><i class="fas fa-users"></i> <span>Users</span></a></li>
  </ul>
  <div class="sidebar-header" style="border-top: 1px solid rgba(255,255,255,0.1); border-bottom: none;">
    <a href="login.html" style="color: white; text-decoration: none;"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
  </div>
</nav>

<div class="main-content">
  <header>
    <div>
      <h1>Order Management</h1>
      <p style="opacity: 0.8;">Admin Control Center</p>
    </div>
    <div class="admin-profile">
      <i class="fas fa-user-shield fa-lg"></i>
      <span>Admin Panel</span>
    </div>
  </header>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon" style="background: var(--warning);"><i class="fas fa-clock"></i></div>
      <div><h3 id="stat-pending">0</h3><p>Pending</p></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background: var(--info);"><i class="fas fa-box"></i></div>
      <div><h3 id="stat-packed">0</h3><p>Packed</p></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background: var(--primary);"><i class="fas fa-truck"></i></div>
      <div><h3 id="stat-shipped">0</h3><p>Shipped</p></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background: var(--success);"><i class="fas fa-check-circle"></i></div>
      <div><h3 id="stat-delivered">0</h3><p>Delivered</p></div>
    </div>
  </div>

  <div class="orders-section">
    <div class="section-header">
      <div class="table-controls">
        <div class="search-wrapper">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search Order ID, Customer..." oninput="filterOrders()">
        </div>
        <div class="filter-group">
          <button class="filter-btn active" onclick="filterByStatus('all')">All Orders</button>
          <button class="filter-btn" onclick="filterByStatus('Pending')">Pending</button>
          <button class="filter-btn" onclick="filterByStatus('Packed')">Packed</button>
          <button class="filter-btn" onclick="filterByStatus('Shipped')">Shipped</button>
          <button class="filter-btn" onclick="filterByStatus('Delivered')">Delivered</button>
        </div>
      </div>
      <button class="btn-view" onclick="loadOrders()" title="Refresh Data">
        <i class="fas fa-sync-alt"></i>
      </button>
    </div>

    <div id="loading" style="text-align: center; padding: 40px; display: none;">
      <div class="spinner"></div>
      <p style="color: #64748b;">Loading data...</p>
    </div>

    <div class="table-responsive" id="ordersTable">
      <table>
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Product</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal" id="orderModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3><i class="fas fa-receipt"></i> Order Details</h3>
      <button class="close-modal" onclick="closeModal()">&times;</button>
    </div>
    <div id="orderDetails" class="order-info-grid"></div>
    <div style="margin-top: 25px; text-align: right;">
      <button class="filter-btn active" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <i id="toastIcon" class="fas fa-check-circle"></i>
  <div>
    <strong id="toastTitle">Success</strong>
    <p id="toastMessage">Order updated successfully!</p>
  </div>
</div>

<script>
let allOrders = [];
let currentFilter = 'all';

// Mobile Sidebar Toggle
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('active');
  overlay.classList.toggle('active');
}

function closeSidebarMobile() {
  if (window.innerWidth <= 768) {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
  }
}

// Original Functions (Logic maintained)
function checkAdminAccess() {
  const role = localStorage.getItem("role");
  if (role !== "admin") {
    alert("🚫 Admin Access Only!");
    window.location.href = "home.html";
    return false;
  }
  return true;
}

async function loadOrders() {
  if (!checkAdminAccess()) return;
  const loading = document.getElementById("loading");
  const ordersTable = document.getElementById("ordersTable");
  loading.style.display = "block";
  ordersTable.style.opacity = "0.3";

  try {
    const response = await fetch("https://shopeasy-ecommerce-1-0bpu.onrender.com/api/purchased");
    const orders = await response.json();
    allOrders = orders;
    updateStats(orders);
    renderOrders(orders);
    loading.style.display = "none";
    ordersTable.style.opacity = "1";
  } catch (error) {
    showToast("Error connecting to server", "error");
    loading.style.display = "none";
  }
}

function updateStats(orders) {
  const stats = { pending: 0, packed: 0, shipped: 0, delivered: 0 };
  orders.forEach(order => {
    const s = order.status || "Pending";
    if (s === "Pending") stats.pending++;
    else if (s === "Packed") stats.packed++;
    else if (s === "Shipped" || s === "Out for Delivery") stats.shipped++;
    else if (s === "Delivered") stats.delivered++;
  });
  document.getElementById("stat-pending").textContent = stats.pending;
  document.getElementById("stat-packed").textContent = stats.packed;
  document.getElementById("stat-shipped").textContent = stats.shipped;
  document.getElementById("stat-delivered").textContent = stats.delivered;
}

function renderOrders(orders) {
  const tbody = document.getElementById("ordersBody");
  tbody.innerHTML = orders.length === 0 ? '<tr><td colspan="6" style="text-align:center; padding: 30px;">No orders found.</td></tr>' : "";
  
  orders.forEach(order => {
    const status = order.status || "Pending";
    const statusClass = status.toLowerCase().replace(/ /g, '-');
    const row = document.createElement("tr");
    row.innerHTML = `
      <td><strong style="color:var(--primary)">#${order._id.substring(0,8)}</strong></td>
      <td>${order.userId?.substring(0,8) || "Guest"}</td>
      <td>${order.name}</td>
      <td>₱${(order.totalAmount || 0).toLocaleString()}</td>
      <td><span class="status-badge ${statusClass}">${status}</span></td>
      <td>
        <div style="display: flex; gap: 8px; align-items:center;">
          <select class="status-select" id="status-${order._id}" onchange="markAsChanged('${order._id}')">
            <option value="Pending" ${status === "Pending" ? "selected" : ""}>Pending</option>
            <option value="Packed" ${status === "Packed" ? "selected" : ""}>Packed</option>
            <option value="Shipped" ${status === "Shipped" ? "selected" : ""}>Shipped</option>
            <option value="Delivered" ${status === "Delivered" ? "selected" : ""}>Delivered</option>
            <option value="Cancelled" ${status === "Cancelled" ? "selected" : ""}>Cancelled</option>
          </select>
          <button class="btn-update" id="btn-${order._id}" onclick="updateStatus('${order._id}')" disabled title="Save Changes">
            <i class="fas fa-save"></i>
          </button>
          <button class="btn-view" onclick="viewOrder('${order._id}')" title="View Details">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </td>
    `;
    tbody.appendChild(row);
  });
}

function markAsChanged(id) {
  const btn = document.getElementById(`btn-${id}`);
  btn.disabled = false;
  btn.style.background = "var(--success)";
}

async function updateStatus(id) {
  const newStatus = document.getElementById(`status-${id}`).value;
  const btn = document.getElementById(`btn-${id}`);
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
  
  try {
    const res = await fetch(`https://shopeasy-ecommerce-1-0bpu.onrender.com/api/purchased/update-status/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: newStatus })
    });
    const data = await res.json();
    if (data.success) {
      showToast("Order status updated!", "success");
      loadOrders();
    }
  } catch (e) { 
    showToast("Server error occurred", "error");
    btn.innerHTML = '<i class="fas fa-save"></i>';
  }
}

function filterByStatus(status) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  filterOrders();
}

function filterOrders() {
  const term = document.getElementById("searchInput").value.toLowerCase();
  let filtered = allOrders;
  if (currentFilter !== 'all') filtered = filtered.filter(o => o.status === currentFilter);
  if (term) {
    filtered = filtered.filter(o => 
      o._id.toLowerCase().includes(term) || o.name?.toLowerCase().includes(term)
    );
  }
  renderOrders(filtered);
}

// Popups (Modal) logic
function viewOrder(id) {
  const o = allOrders.find(x => x._id === id);
  if(!o) return;

  const det = document.getElementById("orderDetails");
  det.innerHTML = `
    <div class="info-item"><label>Order ID</label><p>#${o._id}</p></div>
    <div class="info-item"><label>Customer ID</label><p>${o.userId || 'N/A'}</p></div>
    <div class="info-item"><label>Product Name</label><p>${o.name}</p></div>
    <div class="info-item"><label>Date Purchased</label><p>${o.date || 'N/A'}</p></div>
    <div class="info-item"><label>Price (Unit)</label><p>₱${(o.price || 0).toLocaleString()}</p></div>
    <div class="info-item"><label>Quantity</label><p>${o.quantity || 1}</p></div>
    <div class="info-item" style="grid-column: span 2; background: var(--primary); color: white;">
      <label style="color: rgba(255,255,255,0.7)">Total Paid Amount</label>
      <p style="font-size: 1.2rem; color: white;">₱${(o.totalAmount || 0).toLocaleString()}</p>
    </div>
  `;
  document.getElementById("orderModal").classList.add("show");
}

function closeModal() { document.getElementById("orderModal").classList.remove("show"); }

// Toast logic
function showToast(m, type = "success") {
  const t = document.getElementById("toast");
  const icon = document.getElementById("toastIcon");
  
  t.className = `toast show ${type}`;
  document.getElementById("toastTitle").textContent = type === "success" ? "Success" : "Error";
  document.getElementById("toastMessage").textContent = m;
  
  icon.className = type === "success" ? "fas fa-check-circle" : "fas fa-exclamation-circle";

  setTimeout(() => t.classList.remove("show"), 3000);
}

// Close modal on background click
window.onclick = (e) => { 
  if(e.target.className === 'modal show') closeModal(); 
}

// Close sidebar when clicking outside on mobile
document.addEventListener('click', (e) => {
  const sidebar = document.getElementById('sidebar');
  const menuToggle = document.querySelector('.menu-toggle');
  
  if (window.innerWidth <= 768 && 
      sidebar.classList.contains('active') && 
      !sidebar.contains(e.target) && 
      !menuToggle.contains(e.target)) {
    toggleSidebar();
  }
});

window.onload = loadOrders;
</script>
</body>
</html>
